# ─────────────────────────────────────────────────────────────
#  Contribution Snake · generates snake.svg + snake-dark.svg
#  Output is pushed to the `output` branch and served via raw.githubusercontent
# ─────────────────────────────────────────────────────────────
name: Generate Snake

on:
  schedule:
    - cron: "17 2 * * *"        # daily at 02:17 UTC (off the busy top-of-hour)
  workflow_dispatch:            # allow manual runs
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=#D4A574

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
