# ─────────────────────────────────────────────────────────────
#  Profile Metrics · lowlighter/metrics (terminal template)
#  Replaces the rate-limited github-readme-stats / trophy cards.
#  Generates github-metrics.svg and commits it to the repo, so the
#  README serves a STATIC file from raw.githubusercontent → never rate-limited.
#  Requires a classic PAT saved as secret METRICS_TOKEN (scopes: repo, read:user).
# ─────────────────────────────────────────────────────────────
name: Update Metrics

on:
  schedule:
    - cron: "41 3 * * *"        # daily at 03:41 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Alshahriar-07
          filename: github-metrics.svg
          # terminal template = dark, prompt-styled card that matches the README
          setup_community_templates: lowlighter/metrics@master/source/templates/terminal
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dhaka
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
